upstream cognia_api {
  server api:3000;
  keepalive 32;
}

# Reasonable defaults for SPA + reverse proxy.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compress responses (HTML, JS, CSS, JSON, fonts).
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
  gzip_vary on;

  # Long-cache hashed assets (Vite emits them with content hashes).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API + auth + SCIM + the public v1/mcp surfaces are all proxied to the API.
  # Order matters: more specific paths first.
  location ~ ^/(api|v1|mcp|scim|auth|health)(/|$) {
    proxy_pass http://cognia_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Connection        "";

    # Pass cookies through unmodified.
    proxy_pass_request_headers on;

    # SSE / long-poll: disable buffering so events flush immediately.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    # The API enforces CORS / CSRF; we just relay.
    client_max_body_size 50m;
  }

  # SPA fallback — every non-asset, non-API route returns index.html so the
  # React router can pick it up client-side.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
