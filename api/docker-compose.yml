services:
  postgres:
    image: postgres:15
    container_name: cognia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cognia
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '5432:5432'
    volumes:
      - cognia_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cognia']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cognia_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cognia_qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - cognia_qdrant_data:/qdrant/storage
    healthcheck:
      # The qdrant image has no curl/wget/nc, so use bash's TCP self-test.
      test: ['CMD-SHELL', "bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - cognia_network

  redis:
    image: redis:7-alpine
    container_name: cognia_redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - cognia_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognia_network

  # One-shot migration container. Runs `prisma migrate deploy` against the
  # postgres service and exits. The `api` service waits for this to succeed.
  # Activate with: `docker compose --profile app up`
  migrate:
    profiles: ['app']
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      secrets:
        - npmrc
    container_name: cognia_migrate
    command: ['npx', 'prisma', 'migrate', 'deploy']
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cognia
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cognia_network
    restart: 'no'

  api:
    profiles: ['app']
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - npmrc
    container_name: cognia_api
    restart: unless-stopped
    ports:
      # Defaults to 3100 to avoid colliding with a host dev server on 3000.
      # Override with: API_HOST_PORT=3000 docker compose --profile app up
      - '${API_HOST_PORT:-3100}:3000'
    # Inherit application secrets and config from .env. The container-network
    # URLs below override the localhost values in that file. Cookie/CORS
    # settings are inherited from .env so dev (.env COOKIE_SECURE=false,
    # COOKIE_DOMAIN=localhost) and prod (.env COOKIE_SECURE=true,
    # COOKIE_DOMAIN=.your-domain.tld, CORS_ALLOWED_ORIGINS=https://...) both work.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cognia
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      LOG_FILE_PATH: /app/logs/app.log
      LOCAL_STORAGE_PATH: /app/uploads
    volumes:
      - cognia_uploads:/app/uploads
      - cognia_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - cognia_network

  client:
    profiles: ['app']
    build:
      context: ../client
      dockerfile: Dockerfile
      args:
        # Empty VITE_API_URL means the front-end uses relative URLs, which
        # nginx then proxies to the api service (see nginx.conf).
        VITE_API_URL: ''
        VITE_SERVER_URL: ''
        VITE_HTTPS_ENABLE: 'false'
        VITE_ENABLE_INTERNAL_ROUTES: 'true'
    container_name: cognia_client
    restart: unless-stopped
    ports:
      - '${CLIENT_HOST_PORT:-5173}:80'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cognia_network

secrets:
  npmrc:
    # Pull from the host's home .npmrc (fresh GitHub Packages token).
    # The project-local ./.npmrc is gitignored elsewhere and may be stale.
    file: ${HOME}/.npmrc

volumes:
  cognia_logs:
    driver: local
  cognia_data:
    driver: local
  cognia_qdrant_data:
    driver: local
  cognia_redis_data:
    driver: local
  cognia_uploads:
    driver: local

networks:
  cognia_network:
    driver: bridge
